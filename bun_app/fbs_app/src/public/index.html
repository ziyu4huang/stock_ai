<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FBS Stock</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #121212; color: #e0e0e0; font-family: 'Consolas', 'Microsoft JhengHei', monospace; font-size: 13px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ===== Tab Bar ===== */
.tab-bar { display: flex; align-items: center; background: #0a0a0a; border-bottom: 1px solid #2a2a2a; padding: 0 12px; flex-shrink: 0; height: 36px; }
.tab-bar .logo { font-size: 14px; font-weight: bold; color: #4fc3f7; margin-right: 16px; }
.tab-btn { padding: 6px 14px; background: transparent; color: #666; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-size: 13px; margin-bottom: -1px; }
.tab-btn:hover { color: #aaa; }
.tab-btn.active { color: #4fc3f7; border-bottom-color: #4fc3f7; }
.tab-content { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.tab-content.active { display: flex; }

/* ===== Chart Tab — new layout ===== */
.chart-toolbar { display: flex; align-items: center; gap: 8px; padding: 4px 12px; background: #1a1a1a; border-bottom: 1px solid #2a2a2a; flex-shrink: 0; height: 32px; }
.chart-toolbar .sym-input { width: 64px; padding: 2px 6px; background: #121212; border: 1px solid #333; color: #e0e0e0; border-radius: 2px; font-size: 13px; font-family: inherit; text-align: center; }
.chart-toolbar .stock-name { font-size: 13px; color: #aaa; margin-right: 8px; }
.mode-group { display: flex; gap: 2px; }
.mode-btn { padding: 2px 8px; border: 1px solid #333; border-radius: 2px; background: transparent; color: #666; cursor: pointer; font-size: 11px; font-family: inherit; }
.mode-btn.active { background: #1a3a5c; color: #4fc3f7; border-color: #4fc3f7; }
.sep { color: #333; }
.tf-group { display: flex; gap: 2px; }
.tf-btn { padding: 2px 8px; border: 1px solid #333; border-radius: 2px; background: transparent; color: #666; cursor: pointer; font-size: 11px; font-family: inherit; }
.tf-btn.active { background: #1a3a5c; color: #4fc3f7; border-color: #4fc3f7; }
.date-picker { display: none; }
.date-label { color: #666; font-size: 11px; cursor: pointer; }
.date-label:hover { color: #4fc3f7; }

/* Date popup */
.dp-overlay { display: none; position: fixed; z-index: 100; top: 0; left: 0; right: 0; bottom: 0; }
.dp-overlay.open { display: block; }
.dp-popup { display: none; position: absolute; z-index: 101; background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); min-width: 200px; }
.dp-popup.open { display: block; }
.dp-popup-title { font-size: 11px; color: #666; margin-bottom: 6px; }
.dp-quick { display: flex; flex-direction: column; gap: 2px; margin-bottom: 8px; }
.dp-quick-btn { padding: 5px 8px; background: transparent; border: 1px solid #2a2a2a; border-radius: 3px; color: #aaa; font-size: 12px; font-family: inherit; cursor: pointer; text-align: left; }
.dp-quick-btn:hover { background: #1a3a5c; color: #4fc3f7; border-color: #4fc3f7; }
.dp-quick-btn.active { background: #1a3a5c; color: #4fc3f7; border-color: #4fc3f7; }
.dp-divider { border-top: 1px solid #2a2a2a; margin: 6px 0; }
.dp-custom-row { display: flex; align-items: center; gap: 6px; }
.dp-input { flex: 1; padding: 4px 8px; background: #121212; border: 1px solid #333; color: #e0e0e0; border-radius: 2px; font-size: 12px; font-family: inherit; color-scheme: dark; }
.dp-go-btn { padding: 4px 12px; background: #1a3a5c; color: #4fc3f7; border: 1px solid #4fc3f7; border-radius: 2px; cursor: pointer; font-size: 12px; font-family: inherit; }
.dp-go-btn:hover { background: #1a4a8a; }

/* Price header — compact */
.price-header { display: flex; align-items: baseline; gap: 10px; padding: 4px 12px; background: #121212; border-bottom: 1px solid #2a2a2a; flex-shrink: 0; }
.price-header .price { font-size: 22px; font-weight: bold; }
.price-header .change { font-size: 13px; font-weight: bold; }
.price-header .vol { font-size: 12px; color: #888; }
.up { color: #00e676; }
.down { color: #ff1744; }
.flat { color: #888; }

/* Main area: chart + right panel */
.main-area { display: flex; flex: 1; min-height: 0; overflow: hidden; }
.chart-col { flex: 1; display: flex; flex-direction: column; min-width: 0; border-right: 1px solid #2a2a2a; }
.chart-wrap { flex: 1; position: relative; min-height: 0; }
#chart { width: 100%; height: 100%; }
#status { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #555; font-size: 13px; text-align: center; pointer-events: none; z-index: 10; }
#status.error { color: #ff1744; }
#status.loading { color: #4fc3f7; }

/* Right panel */
.right-panel { flex: 1; display: flex; flex-direction: column; flex-shrink: 0; background: #0f0f0f; min-width: 0; }

/* Order book (五檔) */
.ob-section { padding: 6px 8px; border-bottom: 1px solid #2a2a2a; }
.ob-title { font-size: 11px; color: #666; margin-bottom: 4px; display: flex; justify-content: space-between; }
.ob-title .ratio { font-size: 11px; }
.ob-title .ratio .inner { color: #ff69b4; }
.ob-title .ratio .outer { color: #00ced1; }
.ob-row { display: flex; align-items: center; font-size: 12px; height: 20px; position: relative; }
.ob-row .ob-bar { position: absolute; top: 0; height: 100%; opacity: 0.2; }
.ob-row .ob-bar.ask-bar { right: 50%; background: #00ced1; }
.ob-row .ob-bar.bid-bar { left: 50%; background: #ff69b4; }
.ob-row .ob-qty { width: 52px; text-align: right; padding-right: 4px; position: relative; z-index: 1; font-size: 11px; }
.ob-row .ob-price { width: 72px; text-align: center; font-weight: bold; position: relative; z-index: 1; }
.ob-row .ob-qty.right { text-align: left; padding-left: 4px; padding-right: 0; }
.ob-row .ob-price.bid-price { color: #00e676; }
.ob-row .ob-price.ask-price { color: #ff1744; }

/* Stats panel */
.stats-section { padding: 6px 8px; border-bottom: 1px solid #2a2a2a; overflow-y: auto; flex-shrink: 0; }
.stats-title { font-size: 11px; color: #666; margin-bottom: 4px; }
.stat-row { display: flex; justify-content: space-between; font-size: 12px; padding: 1px 0; }
.stat-row .label { color: #666; }
.stat-row .value { color: #ccc; }

/* Transaction table (成交明細) — now in right panel */
.tx-section { display: flex; flex-direction: column; flex-shrink: 0; }
.tx-title { font-size: 11px; color: #666; padding: 3px 10px; background: #1a1a1a; border-bottom: 1px solid #2a2a2a; flex-shrink: 0; }
.tx-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.tx-table th { padding: 2px 6px; text-align: right; color: #555; font-weight: normal; position: sticky; top: 0; background: #121212; border-bottom: 1px solid #2a2a2a; }
.tx-table th:first-child { text-align: left; }
.tx-table td { padding: 2px 6px; text-align: right; border-bottom: 1px solid #1a1a1a; }
.tx-table td:first-child { text-align: left; color: #888; }
.tx-wrap { flex: 1; overflow-y: auto; }

/* Right panel bottom tabs */
.rp-bottom { border-top: 1px solid #2a2a2a; display: flex; flex-direction: column; flex: 1; min-height: 0; }
.rp-tabs { display: flex; background: #0a0a0a; border-bottom: 1px solid #2a2a2a; flex-shrink: 0; }
.rp-tab-btn { padding: 4px 10px; background: transparent; border: none; border-bottom: 2px solid transparent; color: #555; cursor: pointer; font-size: 11px; font-family: inherit; }
.rp-tab-btn:hover { color: #aaa; }
.rp-tab-btn.active { color: #4fc3f7; border-bottom-color: #4fc3f7; }
.rp-view { display: none; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }
.rp-view.active { display: flex; }

/* Price-volume table (價量表) */
.pv-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.pv-table th { padding: 2px 4px; text-align: right; color: #555; font-weight: normal; position: sticky; top: 0; background: #121212; border-bottom: 1px solid #2a2a2a; }
.pv-table th:first-child { text-align: left; }
.pv-table td { padding: 2px 4px; text-align: right; border-bottom: 1px solid #1a1a1a; }
.pv-table td:first-child { text-align: left; }
.pv-bar { display: inline-block; height: 10px; background: #7c4dff55; vertical-align: middle; }

/* ===== Watchlist Tab ===== */
.wl-layout { display: flex; flex: 1; overflow: hidden; }
.wl-groups { width: 160px; background: #1a1a1a; border-right: 1px solid #2a2a2a; display: flex; flex-direction: column; flex-shrink: 0; }
.wl-groups-header { padding: 8px 12px; font-weight: bold; color: #4fc3f7; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; align-items: center; }
.wl-groups-list { flex: 1; overflow-y: auto; }
.wl-group-item { padding: 8px 12px; cursor: pointer; color: #888; border-bottom: 1px solid #1a1a1a33; display: flex; justify-content: space-between; align-items: center; }
.wl-group-item:hover { background: #1a2744; }
.wl-group-item.active { color: #4fc3f7; background: #0f346044; border-left: 3px solid #4fc3f7; }
.wl-group-item .count { font-size: 11px; color: #555; }
.wl-group-del { background: none; border: none; color: #444; cursor: pointer; font-size: 14px; padding: 0 4px; display: none; }
.wl-group-item:hover .wl-group-del { display: inline; }
.wl-group-del:hover { color: #ff1744; }
.wl-add-group { padding: 8px 12px; border-top: 1px solid #2a2a2a; }
.wl-add-group input { width: 100%; padding: 4px 8px; background: #121212; border: 1px solid #333; color: #e0e0e0; border-radius: 2px; font-size: 12px; font-family: inherit; }
.wl-stocks { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.wl-stocks-header { padding: 8px 16px; background: #1a1a1a; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.wl-stocks-header h3 { color: #4fc3f7; font-size: 14px; }
.wl-add-stock { display: flex; gap: 6px; }
.wl-add-stock input { width: 90px; padding: 4px 8px; background: #121212; border: 1px solid #333; color: #e0e0e0; border-radius: 2px; font-size: 12px; font-family: inherit; }
.btn { padding: 4px 12px; background: #1a3a5c; color: #4fc3f7; border: 1px solid #4fc3f7; border-radius: 2px; cursor: pointer; font-size: 12px; font-family: inherit; }
.btn:hover { background: #1a4a8a; }
.wl-table-wrap { flex: 1; overflow-y: auto; }
.wl-table { width: 100%; border-collapse: collapse; }
.wl-table th { padding: 6px 12px; text-align: left; color: #555; font-size: 11px; font-weight: normal; border-bottom: 1px solid #2a2a2a66; position: sticky; top: 0; background: #121212; }
.wl-table td { padding: 6px 12px; border-bottom: 1px solid #2a2a2a22; }
.wl-table tr { cursor: pointer; }
.wl-table tr:hover { background: #1a2744; }
.wl-table .sym { color: #4fc3f7; font-weight: bold; }
.wl-table .nm { color: #ccc; }
.wl-table .del-btn { background: none; border: none; color: #444; cursor: pointer; font-size: 12px; }
.wl-table .del-btn:hover { color: #ff1744; }
.wl-empty { padding: 40px; text-align: center; color: #444; }

/* Market selector & import/export */
.wl-actions { display: flex; gap: 4px; align-items: center; }
.wl-market-sel { padding: 3px 6px; background: #121212; border: 1px solid #333; color: #ccc; border-radius: 2px; font-size: 11px; font-family: inherit; cursor: pointer; }
.wl-market-sel option { background: #1a1a1a; }
.wl-io-btn { padding: 3px 8px; background: transparent; border: 1px solid #333; color: #888; border-radius: 2px; cursor: pointer; font-size: 11px; font-family: inherit; }
.wl-io-btn:hover { color: #4fc3f7; border-color: #4fc3f7; }
.market-tag { font-size: 10px; padding: 1px 4px; border-radius: 2px; }
.market-tag.tw { background: #1a3a5c33; color: #4fc3f7; }
.market-tag.two { background: #3a1a5c33; color: #ce93d8; }
</style>
</head>
<body>

<!-- ===== Tab Bar ===== -->
<div class="tab-bar">
  <span class="logo">FBS</span>
  <button class="tab-btn active" data-tab="watchlist">自選股</button>
  <button class="tab-btn" data-tab="chart">走勢圖</button>
</div>

<!-- ===== Chart Tab ===== -->
<div class="tab-content" id="tab-chart">
  <div class="chart-toolbar">
    <input type="text" class="sym-input" id="symbolInput" value="2330" maxlength="6" />
    <span class="stock-name" id="stockName"></span>
    <div class="mode-group">
      <button class="mode-btn active" data-mode="live">今日</button>
      <button class="mode-btn" data-mode="history">歷史</button>
    </div>
    <span class="sep">|</span>
    <span class="date-label" id="dateLabel"></span>
    <span class="sep">|</span>
    <div class="tf-group">
      <button class="tf-btn active" data-tf="1">1分</button>
      <button class="tf-btn" data-tf="5">5分</button>
      <button class="tf-btn" data-tf="15">15分</button>
      <button class="tf-btn" data-tf="30">30分</button>
      <button class="tf-btn" data-tf="60">60分</button>
    </div>
  </div>

  <div class="price-header">
    <span class="price" id="priceDisplay">--</span>
    <span class="change" id="changeDisplay">--</span>
    <span class="vol" id="volDisplay"></span>
  </div>

  <div class="main-area">
    <div class="chart-col">
      <div class="chart-wrap">
        <div id="chart"></div>
        <div id="status"></div>
      </div>
    </div>

    <!-- Right panel: order book + stats + bottom tabs -->
    <div class="right-panel">
      <div class="ob-section" id="obSection">
        <div class="ob-title">
          <span>五檔委託</span>
          <span class="ratio"><span class="inner">內<span id="innerPct">--</span></span> / <span class="outer">外<span id="outerPct">--</span></span></span>
        </div>
        <div id="obRows"></div>
      </div>
      <div class="stats-section">
        <div class="stats-title">行情資訊</div>
        <div id="statsRows"></div>
      </div>
      <!-- Bottom tabs: 明細 / 價量表 -->
      <div class="rp-bottom">
        <div class="rp-tabs">
          <button class="rp-tab-btn active" data-rp="tx">明細</button>
          <button class="rp-tab-btn" data-rp="pv">價量表</button>
        </div>
        <div class="rp-view active" id="rpViewTx">
          <div class="tx-wrap">
            <table class="tx-table">
              <thead><tr><th style="width:60px">時間</th><th>買價</th><th>賣價</th><th>成交</th><th>單量</th><th>累計</th></tr></thead>
              <tbody id="txBody"></tbody>
            </table>
          </div>
        </div>
        <div class="rp-view" id="rpViewPv">
          <div class="tx-wrap">
            <table class="pv-table">
              <thead><tr><th>價格</th><th>委託</th><th>成交</th><th>比例</th><th>筆數</th><th>均量</th></tr></thead>
              <tbody id="pvBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Date picker popup (global) -->
<div class="dp-overlay" id="dpOverlay"></div>
<div class="dp-popup" id="dpPopup">
  <div class="dp-popup-title">選擇日期</div>
  <div class="dp-quick" id="dpQuick"></div>
  <div class="dp-divider"></div>
  <div class="dp-custom-row">
    <input type="date" class="dp-input" id="dpInput" />
    <button class="dp-go-btn" id="dpGoBtn">查詢</button>
  </div>
</div>
<div class="tab-content active" id="tab-watchlist">
  <div class="wl-layout">
    <div class="wl-groups">
      <div class="wl-groups-header"><span>群組</span></div>
      <div class="wl-groups-list" id="wlGroupsList"></div>
      <div class="wl-add-group"><input type="text" id="newGroupInput" placeholder="+ 新群組名稱" maxlength="10" /></div>
    </div>
    <div class="wl-stocks">
      <div class="wl-stocks-header">
        <h3 id="wlGroupName">自選股</h3>
        <div class="wl-actions">
          <div class="wl-add-stock">
            <input type="text" id="newStockInput" placeholder="股票代號" maxlength="10" />
            <select class="wl-market-sel" id="marketSelect">
              <option value="auto">自動</option>
              <option value="TW">上市.TW</option>
              <option value="TWO">上櫃.TWO</option>
            </select>
            <button class="btn" id="addStockBtn">加入</button>
          </div>
          <button class="wl-io-btn" id="wlExportBtn" title="匯出">&#x2B07; 匯出</button>
          <button class="wl-io-btn" id="wlImportBtn" title="匯入">&#x2B06; 匯入</button>
          <input type="file" id="wlImportFile" accept=".json" style="display:none" />
        </div>
      </div>
      <div class="wl-table-wrap">
        <table class="wl-table">
          <thead><tr><th>代號</th><th>市場</th><th>名稱</th><th>成交</th><th>漲跌</th><th>漲幅%</th><th>總量</th><th></th></tr></thead>
          <tbody id="wlStocksBody"></tbody>
        </table>
        <div class="wl-empty" id="wlEmpty">尚無股票，請輸入代號加入</div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
//  TAB SWITCHING
// ============================================================
let activeTab = 'watchlist';
let chartLoaded = false;
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    if (tab === activeTab) return;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    activeTab = tab;
    if (tab === 'chart') {
      if (chart) chart.resize();
      if (!chartLoaded) { loadChartData(); chartLoaded = true; }
      else if (mode === 'live') startRefresh();
    } else {
      stopRefresh();
      refreshWatchlistQuotes();
    }
  });
});

function switchToChart(sym) {
  symbol = sym;
  document.getElementById('symbolInput').value = toFbsSym(sym);
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.tab-btn[data-tab="chart"]').classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-chart').classList.add('active');
  activeTab = 'chart';
  if (chart) chart.resize();
  if (!chartLoaded) { loadChartData(); chartLoaded = true; }
  else startRefresh();
}

// ============================================================
//  CHART — State
// ============================================================
let mode = 'live';
let timeframe = '1';
let refreshTimer = null;
let chart = null;
let symbol = new URLSearchParams(location.search).get('symbol') || '2330';
let currentQuote = null;
document.getElementById('symbolInput').value = symbol;

function initChart() {
  chart = echarts.init(document.getElementById('chart'), null, { renderer: 'canvas' });
  window.addEventListener('resize', () => { if (activeTab === 'chart') chart.resize(); });
  chart.setOption({
    backgroundColor: '#000000',
    animation: false,
    grid: [
      { left: 60, right: 10, top: 20, height: '65%' },
      { left: 60, right: 10, top: '78%', height: '16%' },
    ],
    xAxis: [
      { type: 'category', data: [], gridIndex: 0, axisLine: { lineStyle: { color: '#2a2a2a' } }, axisTick: { show: false }, axisLabel: { color: '#555', fontSize: 10 } },
      { type: 'category', data: [], gridIndex: 1, axisLine: { lineStyle: { color: '#2a2a2a' } }, axisTick: { show: false }, axisLabel: { show: false } },
    ],
    yAxis: [
      { type: 'value', gridIndex: 0, scale: true, splitLine: { lineStyle: { color: '#1e1e1e' } }, axisLine: { show: false }, axisTick: { show: false }, axisLabel: { color: '#00e676', fontSize: 10 } },
      { type: 'value', gridIndex: 1, scale: true, splitLine: { show: false }, axisLine: { show: false }, axisTick: { show: false }, axisLabel: { color: '#555', fontSize: 9 } },
    ],
    tooltip: { trigger: 'axis', axisPointer: { type: 'cross', crossStyle: { color: '#444' } }, backgroundColor: '#1a1a1aee', borderColor: '#333', textStyle: { color: '#ccc', fontSize: 12 } },
    series: [
      { name: 'Price', type: 'line', xAxisIndex: 0, yAxisIndex: 0, data: [],
        lineStyle: { width: 1.5, color: '#ffd740' },
        showSymbol: false,
        markLine: { silent: true, symbol: 'none', data: [], label: { show: true, position: 'insideEndTop', color: '#aaa', fontSize: 10 } },
      },
      { name: 'MA5', type: 'line', xAxisIndex: 0, yAxisIndex: 0, data: [],
        lineStyle: { width: 1, color: '#ff69b4' }, showSymbol: false },
      { name: 'MA20', type: 'line', xAxisIndex: 0, yAxisIndex: 0, data: [],
        lineStyle: { width: 1, color: '#7c4dff', type: 'dashed' }, showSymbol: false },
      { name: 'Vol', type: 'bar', xAxisIndex: 1, yAxisIndex: 1, data: [],
        itemStyle: { color: '#7c4dff' } },
    ],
  });
}

function calcSMA(data, period) {
  const r = [];
  for (let i = 0; i < data.length; i++) {
    if (i < period - 1) { r.push(null); continue; }
    let s = 0;
    for (let j = i - period + 1; j <= i; j++) s += data[j];
    r.push(+(s / period).toFixed(2));
  }
  return r;
}

function renderChart(candles) {
  if (!candles || !candles.length) return;
  const times = candles.map(c => {
    const d = new Date(c.date);
    return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  });
  const closes = candles.map(c => c.close);
  const volumes = candles.map((c, i) => ({
    value: c.volume,
    itemStyle: { color: c.close >= (candles[i-1]?.close ?? c.open) ? 'rgba(255,23,68,0.6)' : 'rgba(0,230,118,0.6)' }
  }));
  chart.setOption({
    xAxis: [{ data: times }, { data: times }],
    series: [{ data: closes }, { data: calcSMA(closes, 5) }, { data: calcSMA(closes, 20) }, { data: volumes }],
  });
}

// ============================================================
//  QUOTE — Price header, order book, stats
// ============================================================
function updateQuote(q) {
  if (!q) return;
  currentQuote = q;
  const chg = q.change ?? 0;
  const pct = q.changePercent ?? 0;
  const cls = chg > 0 ? 'up' : chg < 0 ? 'down' : 'flat';

  document.getElementById('stockName').textContent = (q.name || '') + ' ';
  document.getElementById('priceDisplay').textContent = (q.closePrice ?? '--').toLocaleString();
  document.getElementById('priceDisplay').className = 'price ' + cls;
  document.getElementById('changeDisplay').innerHTML =
    `${chg >= 0 ? '▲' : '▼'}${Math.abs(chg).toFixed(2)} (${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%)`;
  document.getElementById('changeDisplay').className = 'change ' + cls;

  // Volume display
  if (q.total) {
    const vol = q.total.tradeVolume ?? 0;
    document.getElementById('volDisplay').textContent = vol.toLocaleString() + ' 張';
  }

  // Order book (五檔)
  renderOrderBook(q);

  // Stats
  renderStats(q);

  // Reference price line on chart
  const ref = q.referencePrice ?? q.previousClose;
  if (ref && chart) {
    chart.setOption({
      series: [{
        markLine: {
          silent: true,
          symbol: 'none',
          lineStyle: { type: [3, 3], color: '#ffffff55', width: 1 },
          data: [{ yAxis: ref }],
          label: { show: true, position: 'insideEndTop', formatter: ref.toFixed(2), color: '#aaa', fontSize: 10 }
        }
      }]
    });
  }
}

function renderOrderBook(q) {
  const bids = q.bids || [];
  const asks = q.asks || [];
  // bids: [0]=best bid (highest), asks: [0]=best ask (lowest)
  const maxQty = Math.max(
    ...bids.map(b => b.size || 0),
    ...asks.map(a => a.size || 0),
    1
  );
  let html = '';
  // Render rows: asks from top (worst to best), then bids (best to worst)
  // asks: show index 4..0 (worst ask at top)
  for (let i = 4; i >= 0; i--) {
    const a = asks[i] || {};
    const pct = ((a.size || 0) / maxQty * 50).toFixed(0);
    html += `<div class="ob-row">
      <div class="ob-qty" style="color:#00ced1">${(a.size || 0).toLocaleString()}</div>
      <div class="ob-bar ask-bar" style="width:${pct}%"></div>
      <div class="ob-price ask-price">${a.price ? a.price.toFixed(2) : '--'}</div>
      <div class="ob-qty right" style="color:#333">—</div>
    </div>`;
  }
  // bids: show index 0..4 (best bid at top, right after asks)
  for (let i = 0; i < 5; i++) {
    const b = bids[i] || {};
    const pct = ((b.size || 0) / maxQty * 50).toFixed(0);
    html += `<div class="ob-row">
      <div class="ob-qty" style="color:#333">—</div>
      <div class="ob-price bid-price">${b.price ? b.price.toFixed(2) : '--'}</div>
      <div class="ob-bar bid-bar" style="width:${pct}%"></div>
      <div class="ob-qty right" style="color:#ff69b4">${(b.size || 0).toLocaleString()}</div>
    </div>`;
  }
  document.getElementById('obRows').innerHTML = html;

  // Inner/outer ratio
  const total = q.total;
  if (total && total.tradeVolumeAtBid != null && total.tradeVolumeAtAsk != null) {
    const bidVol = total.tradeVolumeAtBid || 0;
    const askVol = total.tradeVolumeAtAsk || 0;
    const sum = bidVol + askVol || 1;
    document.getElementById('innerPct').textContent = (bidVol / sum * 100).toFixed(2) + '%';
    document.getElementById('outerPct').textContent = (askVol / sum * 100).toFixed(2) + '%';
  }
}

function renderStats(q) {
  const stats = [
    ['開盤', q.openPrice],
    ['最高', q.highPrice],
    ['最低', q.lowPrice],
    ['昨收', q.referencePrice ?? q.previousClose],
    ['均價', q.avgPrice],
    ['振幅', q.amplitude != null ? (q.amplitude).toFixed(2) + '%' : '--'],
  ];
  if (q.total) {
    stats.push(['成交值', formatValue(q.total.tradeValue)]);
    stats.push(['成交筆', (q.total.transaction || 0).toLocaleString()]);
  }
  let html = '';
  stats.forEach(([label, val]) => {
    const v = typeof val === 'number' ? val.toFixed(2) : (val || '--');
    html += `<div class="stat-row"><span class="label">${label}</span><span class="value">${v}</span></div>`;
  });
  document.getElementById('statsRows').innerHTML = html;
}

function formatValue(v) {
  if (v == null) return '--';
  if (v >= 1e8) return (v / 1e8).toFixed(1) + ' 億';
  if (v >= 1e4) return (v / 1e4).toFixed(0) + ' 萬';
  return v.toLocaleString();
}

// ============================================================
//  TRADES — Transaction table
// ============================================================
async function fetchTrades() {
  try {
    const res = await fetch(`/api/intraday/trades?symbol=${toFbsSym(symbol)}&limit=500`);
    const data = await res.json();
    if (data.data && data.data.length) renderTrades(data.data);
    else document.getElementById('txBody').innerHTML = '';
  } catch {}
  // Fetch price-volume data
  try {
    const res = await fetch(`/api/intraday/volumes?symbol=${toFbsSym(symbol)}`);
    const data = await res.json();
    if (data.data && data.data.length) { lastVolData = data.data; renderPriceVolume(); }
    else { lastVolData = []; document.getElementById('pvBody').innerHTML = ''; }
  } catch {}
}

function renderTrades(trades) {
  lastTrades = trades;
  const tbody = document.getElementById('txBody');
  // Show newest first
  const rows = trades.slice().reverse();
  tbody.innerHTML = rows.map(t => {
    const time = t.time != null ? formatTime(t.time) : '--';
    const price = t.price != null ? t.price.toFixed(2) : '--';
    const cls = t.price > (t.ask || t.price) ? 'up' : t.price < (t.bid || t.price) ? 'down' : '';
    return `<tr>
      <td>${time}</td>
      <td style="color:#ff69b4">${t.bid != null ? t.bid.toFixed(2) : '--'}</td>
      <td style="color:#00ced1">${t.ask != null ? t.ask.toFixed(2) : '--'}</td>
      <td class="${cls}">${price}</td>
      <td>${t.size || 0}</td>
      <td>${(t.volume || 0).toLocaleString()}</td>
    </tr>`;
  }).join('');
  // Also render price-volume table
  lastTrades = trades;
  renderPriceVolume();
}

function renderPriceVolume() {
  const tbody = document.getElementById('pvBody');
  if (!lastVolData || !lastVolData.length) { tbody.innerHTML = ''; return; }

  const volumes = lastVolData;
  const totalVol = volumes.reduce((s, v) => s + (v.volume || 0), 0) || 1;
  const maxVol = Math.max(...volumes.map(v => v.volume || 0), 1);
  const refPrice = currentQuote?.referencePrice ?? currentQuote?.previousClose;

  // Aggregate trades by price for 筆數/均量
  const tradeMap = {};
  lastTrades.forEach(t => {
    const p = t.price;
    if (!p) return;
    if (!tradeMap[p]) tradeMap[p] = { count: 0, size: 0 };
    tradeMap[p].count += 1;
    tradeMap[p].size += (t.size || 0);
  });

  // Sort by price descending (high to low)
  const items = [...volumes].sort((a, b) => (b.price || 0) - (a.price || 0));

  tbody.innerHTML = items.map(item => {
    const vol = item.volume || 0;
    const pct = (vol / totalVol * 100).toFixed(1);
    const barW = Math.min(vol / maxVol * 60, 60).toFixed(0);
    const cls = refPrice ? (item.price > refPrice ? 'up' : item.price < refPrice ? 'down' : 'flat') : '';
    const bidVol = item.volumeAtBid || 0;
    const askVol = item.volumeAtAsk || 0;
    const tx = tradeMap[item.price];
    const txCount = tx ? tx.count : '-';
    const avgSize = tx ? Math.round(tx.size / tx.count) : '-';
    return `<tr>
      <td class="${cls}">${item.price?.toFixed(2) || '-'}</td>
      <td>${(bidVol + askVol) > 0 ? (bidVol + askVol).toLocaleString() : '-'}</td>
      <td>${vol.toLocaleString()}</td>
      <td><span class="pv-bar" style="width:${barW}px"></span> ${pct}%</td>
      <td>${typeof txCount === 'number' ? txCount.toLocaleString() : txCount}</td>
      <td>${avgSize}</td>
    </tr>`;
  }).join('');
}

function formatTime(t) {
  // FBS SDK returns time as microseconds since Unix epoch
  const d = new Date(t / 1000);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0') + ':' + d.getSeconds().toString().padStart(2,'0');
}

function showStatus(msg, type = '') { const el = document.getElementById('status'); el.textContent = msg; el.className = type; }
function clearStatus() { const el = document.getElementById('status'); el.textContent = ''; el.className = ''; }

async function fetchIntradayCandles() {
  showStatus('Loading...', 'loading');
  try {
    const res = await fetch(`/api/intraday/candles?symbol=${toFbsSym(symbol)}&timeframe=${timeframe}`);
    const data = await res.json();
    if (data.data) { renderChart(data.data); clearStatus(); }
    else if (data.error) { showStatus(data.error, 'error'); }
  } catch (e) { showStatus('Connection error', 'error'); }
}

async function fetchQuote() {
  try {
    const res = await fetch(`/api/intraday/quote?symbol=${toFbsSym(symbol)}`);
    const data = await res.json();
    if (data && !data.error) updateQuote(data);
  } catch {}
}

function startRefresh() {
  stopRefresh();
  if (mode !== 'live') return;
  fetchIntradayCandles();
  fetchQuote();
  fetchTrades();
  refreshTimer = setInterval(() => {
    fetchIntradayCandles();
    fetchQuote();
    fetchTrades();
  }, 15000);
}

function stopRefresh() { if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; } }

function loadChartData() {
  if (!isMarketOpen()) {
    const lastDate = getLastTradeDate();
    document.getElementById('dateLabel').textContent = lastDate;
    mode = 'live';
    fetchHistoricalForDate(lastDate);
  } else {
    document.getElementById('dateLabel').textContent = new Date().toISOString().slice(0, 10);
    startRefresh();
  }
}

// Detect if market is open (TWSE: Mon-Fri 09:00-13:30)
function isMarketOpen() {
  const now = new Date();
  const dow = now.getDay();
  const h = now.getHours(), m = now.getMinutes();
  if (dow === 0 || dow === 6) return false;
  const t = h * 60 + m;
  return t >= 540 && t <= 810; // 09:00–13:30
}

function getLastTradeDate() {
  const d = new Date();
  const dow = d.getDay();
  if (dow === 0) d.setDate(d.getDate() - 2);
  else if (dow === 6) d.setDate(d.getDate() - 1);
  return d.toISOString().slice(0, 10);
}

// Date popup helpers
function getRecentTradeDays(count) {
  const days = [];
  const d = new Date();
  while (days.length < count) {
    d.setDate(d.getDate() - 1);
    const dow = d.getDay();
    if (dow !== 0 && dow !== 6) days.push(d.toISOString().slice(0, 10));
  }
  return days;
}

function openDatePopup(anchorEl) {
  const popup = document.getElementById('dpPopup');
  const overlay = document.getElementById('dpOverlay');
  const quick = document.getElementById('dpQuick');

function fetchHistoricalForDate(date) {
  showStatus('Loading...', 'loading');
  fetch(`/api/historical/candles?symbol=${toFbsSym(symbol)}&timeframe=${timeframe}&from=${date}&to=${date}`)
    .then(r => r.json())
    .then(data => {
      if (data.data && data.data.length) {
        // For minute K-lines: API returns last ~5 days regardless of from/to
        // Filter to only the requested date
        let filtered = data.data.filter(c => c.date && c.date.startsWith(date));
        // If requested date has no data (holiday), auto-detect latest trading day
        if (!filtered.length) {
          const lastDate = data.data[data.data.length - 1].date.slice(0, 10);
          filtered = data.data.filter(c => c.date && c.date.startsWith(lastDate));
          date = lastDate;
          document.getElementById('dateLabel').textContent = date;
        }
        if (!filtered.length) {
          showStatus(`${date} 無交易資料`, 'error');
          return;
        }
        renderChart(filtered);
        clearStatus();
        const first = filtered[0], last = filtered[filtered.length - 1];
        const chg = last.close - first.open;
        const cls = chg > 0 ? 'up' : chg < 0 ? 'down' : 'flat';
        document.getElementById('stockName').textContent = toFbsSym(symbol) + ' ';
        document.getElementById('priceDisplay').textContent = last.close.toFixed(2);
        document.getElementById('priceDisplay').className = 'price ' + cls;
        document.getElementById('changeDisplay').innerHTML =
          `${chg >= 0 ? '▲' : '▼'}${Math.abs(chg).toFixed(2)}`;
        document.getElementById('changeDisplay').className = 'change ' + cls;
      } else if (data.error) { showStatus(data.error, 'error'); }
      else { showStatus(`${date} 無資料`, 'error'); }
    })
    .catch(() => showStatus('Connection error', 'error'));
  fetchQuote();
  fetchTrades();
}

let watchlist = { groups: [{ name: '自選一', stocks: [] }], activeGroup: 0 };

// Strip .TW/.TWO suffix for FBS API calls
function toFbsSym(sym) {
  return sym.replace(/\.(TW|TWO)$/, '');
}

// Extract market suffix from symbol
function getMarket(sym) {
  if (sym.endsWith('.TWO')) return 'TWO';
  return 'TW';
}

// Build full symbol with market suffix
function buildSymbol(code, market) {
  const num = code.replace(/\.(TW|TWO)$/, '');
  return num + '.' + (market || 'TW');
}

async function loadWatchlist() {
  try {
    const res = await fetch('/api/watchlist');
    if (res.ok) watchlist = await res.json();
  } catch {}
  if (!watchlist.groups || !watchlist.groups.length) watchlist = { groups: [{ name: '自選一', stocks: [] }], activeGroup: 0 };
  // Normalize: ensure all symbols have market suffix
  let dirty = false;
  watchlist.groups.forEach(g => {
    g.stocks.forEach((s, i) => {
      if (s.symbol && !/\.(TW|TWO|US)$/i.test(s.symbol)) {
        s.symbol = s.symbol + '.TW';
        dirty = true;
      }
    });
  });
  if (dirty) saveWatchlist();
  renderWatchlist();
}

async function saveWatchlist() {
  await fetch('/api/watchlist', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(watchlist),
  });
}

function renderWatchlist() {
  const g = watchlist.groups;
  const ag = watchlist.activeGroup ?? 0;
  const listEl = document.getElementById('wlGroupsList');
  listEl.innerHTML = '';
  g.forEach((grp, i) => {
    const div = document.createElement('div');
    div.className = 'wl-group-item' + (i === ag ? ' active' : '');
    div.innerHTML = `<span>${grp.name} <span class="count">(${grp.stocks.length})</span></span>
      ${g.length > 1 ? `<button class="wl-group-del" title="刪除">&times;</button>` : ''}`;
    div.addEventListener('click', (e) => {
      if (e.target.classList.contains('wl-group-del')) return;
      watchlist.activeGroup = i;
      saveWatchlist();
      renderWatchlist();
    });
    const delBtn = div.querySelector('.wl-group-del');
    if (delBtn) delBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      g.splice(i, 1);
      if (watchlist.activeGroup >= g.length) watchlist.activeGroup = g.length - 1;
      saveWatchlist();
      renderWatchlist();
    });
    listEl.appendChild(div);
  });
  const group = g[ag] || g[0];
  document.getElementById('wlGroupName').textContent = group.name;
  const tbody = document.getElementById('wlStocksBody');
  const empty = document.getElementById('wlEmpty');
  tbody.innerHTML = '';
  if (!group.stocks.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  group.stocks.forEach((s, i) => {
    const mkt = getMarket(s.symbol);
    const mktLabel = mkt === 'TWO' ? '櫃' : '市';
    const mktCls = mkt === 'TWO' ? 'two' : 'tw';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="sym">${toFbsSym(s.symbol)}</td>
      <td><span class="market-tag ${mktCls}">${mktLabel}</span></td>
      <td class="nm">${s.name || ''}</td>
      <td class="${s._cls || ''}">${s.price ?? '--'}</td>
      <td class="${s._cls || ''}">${s.change ?? '--'}</td>
      <td class="${s._cls || ''}">${s.changePct ?? '--'}</td>
      <td>${s.volume ?? '--'}</td>
      <td><button class="del-btn" title="移除">&times;</button></td>`;
    tr.addEventListener('click', (e) => {
      if (e.target.classList.contains('del-btn')) return;
      switchToChart(s.symbol);
    });
    tr.querySelector('.del-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      group.stocks.splice(i, 1);
      saveWatchlist();
      renderWatchlist();
    });
    tbody.appendChild(tr);
  });
}

async function addStock() {
  const input = document.getElementById('newStockInput');
  const rawSym = input.value.trim();
  if (!rawSym) return;
  const marketSel = document.getElementById('marketSelect').value;
  const group = watchlist.groups[watchlist.activeGroup ?? 0];

  // Resolve full symbol: if already has suffix, use as-is; otherwise build with market
  let fullSym;
  if (/\.(TW|TWO|US)$/i.test(rawSym)) {
    fullSym = rawSym.toUpperCase();
  } else if (marketSel === 'auto') {
    // Auto-detect: try .TW first, then .TWO
    fullSym = await autoDetectMarket(rawSym);
  } else {
    fullSym = buildSymbol(rawSym, marketSel);
  }

  if (group.stocks.some(s => s.symbol === fullSym)) { input.value = ''; return; }
  let name = '';
  try {
    const res = await fetch(`/api/intraday/quote?symbol=${toFbsSym(fullSym)}`);
    const data = await res.json();
    if (data.name) name = data.name;
  } catch {}
  group.stocks.push({ symbol: fullSym, name });
  input.value = '';
  saveWatchlist();
  renderWatchlist();
}

async function autoDetectMarket(code) {
  // Try .TW first (上市)
  try {
    const res = await fetch(`/api/intraday/quote?symbol=${code}`);
    const data = await res.json();
    if (data && !data.error) return code + '.TW';
  } catch {}
  // Try .TWO (上櫃)
  try {
    const res = await fetch(`/api/intraday/quote?symbol=${code}`);
    const data = await res.json();
    if (data && !data.error) return code + '.TWO';
  } catch {}
  // Default to .TW
  return code + '.TW';
}

async function refreshWatchlistQuotes() {
  const group = watchlist.groups[watchlist.activeGroup ?? 0];
  if (!group || !group.stocks.length) return;
  for (const s of group.stocks) {
    try {
      const res = await fetch(`/api/intraday/quote?symbol=${toFbsSym(s.symbol)}`);
      const q = await res.json();
      if (q.error) continue;
      s.name = q.name || s.name;
      s.price = q.closePrice ?? '--';
      const chg = q.change ?? 0;
      s.change = (chg >= 0 ? '+' : '') + chg.toFixed(2);
      s.changePct = (q.changePercent ?? 0).toFixed(2) + '%';
      s.volume = q.total ? (q.total.tradeVolume ?? 0).toLocaleString() + ' 張' : '--';
      s._cls = chg >= 0 ? 'up' : 'down';
    } catch {}
  }
  renderWatchlist();
}

document.getElementById('dateLabel').textContent = new Date().toISOString().slice(0, 10);

loadWatchlist();
