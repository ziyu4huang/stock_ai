<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐋 WHALE RADAR v2 — Web Debug</title>
<style>
  :root {
    --bg: #0a0a0a; --bg2: #111; --bg3: #1a1a1a;
    --border: #333; --text: #ccc; --dim: #666;
    --green: #4caf50; --lgreen: #69f0ae; --red: #ef5350; --lred: #ff5252;
    --cyan: #00bcd4; --yellow: #ffd600; --magenta: #e040fb;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Menlo', 'SF Mono', monospace; font-size: 12px; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

  /* Tab bar */
  .tab-bar { display: flex; align-items: center; background: var(--bg2); border-bottom: 1px solid var(--border); padding: 2px 6px; gap: 2px; flex-shrink: 0; }
  .tab-bar .title { color: var(--dim); font-size: 11px; margin-right: 8px; white-space: nowrap; }
  .tab-btn { background: transparent; border: 1px solid transparent; color: var(--dim); padding: 3px 8px; cursor: pointer; font-family: inherit; font-size: 11px; border-radius: 3px; transition: all 0.1s; }
  .tab-btn:hover { background: var(--bg3); }
  .tab-btn.active { background: #fff; color: #000; font-weight: bold; border-color: #fff; }
  .tab-btn.has-signal { color: var(--lred); font-weight: bold; }
  .tab-sep { flex: 1; }
  .indicator { font-size: 11px; padding: 2px 6px; cursor: pointer; border-radius: 3px; user-select: none; }
  .indicator:hover { background: var(--bg3); }
  .indicator.on { font-weight: bold; }

  /* Main */
  .main { display: flex; flex: 1; overflow: hidden; }
  .col-left { width: 38%; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
  .col-mid { width: 22%; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
  .col-right { width: 40%; display: flex; flex-direction: column; }

  .panel { border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .panel-header { background: var(--bg2); padding: 2px 8px; font-size: 11px; color: var(--dim); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .panel-body { padding: 4px 6px; overflow-y: auto; flex: 1; }

  /* Order book */
  .ob-row { display: flex; align-items: center; padding: 1px 0; }
  .ob-label { width: 50px; color: var(--dim); }
  .ob-price { width: 80px; text-align: right; }
  .ob-lots { width: 60px; text-align: right; }
  .ob-bar { flex: 1; height: 10px; margin-left: 4px; border-radius: 2px; }
  .ask .ob-price, .ask .ob-label { color: var(--red); }
  .ask .ob-bar { background: rgba(239,83,80,0.3); }
  .bid .ob-price, .bid .ob-label { color: var(--green); }
  .bid .ob-bar { background: rgba(76,175,80,0.3); }
  .spread-row { text-align: center; padding: 3px 0; color: #fff; font-weight: bold; font-size: 12px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .pressure-row { text-align: center; padding: 2px 0; font-size: 11px; }

  /* Signal radar */
  .score-bar-wrap { margin: 4px 0; }
  .score-label { font-size: 16px; font-weight: bold; }
  .score-bar { height: 14px; background: var(--bg3); border-radius: 3px; position: relative; margin: 2px 0; }
  .score-bar .mid { position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: var(--dim); }
  .score-bar .fill { position: absolute; top: 0; bottom: 0; border-radius: 3px; }
  .market-state { font-size: 14px; font-weight: bold; padding: 4px 0; }
  .hmm-state { font-size: 12px; padding: 2px 0; }
  .hmm-agree { color: var(--green); font-size: 10px; margin-left: 6px; }
  .hmm-div { color: var(--yellow); font-size: 10px; margin-left: 6px; }
  .action-box { border: 1px solid var(--border); border-radius: 4px; padding: 6px; margin: 4px 0; }
  .action-label { font-size: 14px; font-weight: bold; text-align: center; padding: 2px; }
  .sl-label { font-size: 11px; color: var(--yellow); text-align: center; }
  .counter-row { display: flex; align-items: center; padding: 1px 0; font-size: 11px; }
  .counter-label { width: 80px; color: var(--dim); }
  .counter-bar { flex: 1; height: 8px; border-radius: 2px; margin: 0 4px; }
  .counter-val { width: 24px; text-align: right; font-weight: bold; }
  .price-row { text-align: center; padding: 4px 0; font-size: 13px; }
  .sound-row { font-size: 11px; color: var(--cyan); padding: 2px 0; }

  /* Alerts */
  .alert-item { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .alert-time { color: var(--dim); font-size: 10px; }
  .alert-line1 { font-size: 11px; }
  .alert-line2 { font-size: 10px; color: var(--dim); }

  /* Tick feed */
  .tick-item { display: flex; align-items: center; padding: 1px 0; font-size: 11px; }
  .tick-time { color: var(--dim); width: 64px; }
  .tick-arrow { width: 14px; text-align: center; font-weight: bold; }
  .tick-price { width: 70px; text-align: right; }
  .tick-tag { width: 60px; font-size: 10px; }
  .tick-amount { width: 50px; text-align: right; }
  .tick-shares { color: var(--dim); }

  /* Status bar */
  .status-bar { background: var(--bg2); border-top: 1px solid var(--border); padding: 2px 8px; font-size: 10px; color: var(--dim); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .status-bar .live { color: var(--green); font-weight: bold; }
  .status-bar .paused { color: var(--yellow); font-weight: bold; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
</style>
</head>
<body>
<!-- Tab bar -->
<div class="tab-bar">
  <span class="title">🐋 WHALE RADAR v2</span>
  <div id="tabs"></div>
  <span class="tab-sep"></span>
  <span id="ind-auto" class="indicator" onclick="cmd('toggle_auto')">A:◉</span>
  <span id="ind-sound" class="indicator" onclick="cmd('toggle_sound')">S:🔊</span>
  <span id="ind-voice" class="indicator" onclick="cmd('toggle_voice')">V:🗣</span>
  <span id="ind-pause" class="indicator" onclick="cmd('toggle_pause')" style="color:var(--yellow);display:none">⏸ PAUSED</span>
</div>

<!-- Main 3-column -->
<div class="main">
  <!-- Left: Order book -->
  <div class="col-left">
    <div class="panel" style="flex:1">
      <div class="panel-header" id="ob-title">ORDER BOOK 五檔</div>
      <div class="panel-body" id="order-book"></div>
    </div>
  </div>
  <!-- Middle: Signal radar + alerts -->
  <div class="col-mid">
    <div class="panel" style="flex:55">
      <div class="panel-header">SIGNAL RADAR 信號雷達</div>
      <div class="panel-body" id="signal-radar"></div>
    </div>
    <div class="panel" style="flex:45">
      <div class="panel-header">ALERTS</div>
      <div class="panel-body" id="alerts"></div>
    </div>
  </div>
  <!-- Right: Tick feed -->
  <div class="col-right">
    <div class="panel" style="flex:1">
      <div class="panel-header" id="tick-title">TICK FEED</div>
      <div class="panel-body" id="tick-feed"></div>
    </div>
  </div>
</div>

<!-- Status bar -->
<div class="status-bar">
  <span id="status-live" class="live">[LIVE]</span>
  <span>[1-5]Tab</span>
  <span>[←→]</span>
  <span>[A]Auto</span>
  <span>[S]Sound</span>
  <span>[V]Voice</span>
  <span>[P]Pause</span>
  <span>[Space]Clear</span>
  <span>[Q]Quit</span>
  <span style="flex:1"></span>
  <span id="status-events">Ev:0</span>
  <span id="status-time"></span>
</div>

<script>
let ws;
let lastState = null;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onmessage = (e) => {
    try {
      lastState = JSON.parse(e.data);
      render(lastState);
    } catch(err) { console.error('parse error', err); }
  };
  ws.onclose = () => setTimeout(connect, 1000);
  ws.onerror = () => {};
}
connect();

function cmd(action, extra) {
  const body = extra ? { action, ...extra } : { action };
  fetch('/api/command', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
}

function switchTab(i) { cmd('switch_tab', { index: i }); }

function render(s) {
  // Tabs
  const tabsEl = document.getElementById('tabs');
  let tabsHtml = '';
  s.tabs.forEach((t, i) => {
    const active = i === s.active_tab ? ' active' : '';
    const signal = t.has_signal ? ' has-signal' : '';
    const icon = t.has_signal ? (t.signal_dir === 'Long' ? '🔥▲' : t.signal_dir === 'Short' ? '🔥▼' : '★') : '';
    tabsHtml += `<button class="tab-btn${active}${signal}" data-testid="tab-${i}" onclick="switchTab(${i})">${i+1}:${t.symbol} ${t.name}${icon}</button>`;
  });
  tabsEl.innerHTML = tabsHtml;

  // Indicators
  const autoEl = document.getElementById('ind-auto');
  autoEl.textContent = s.auto_switch ? 'A:◉' : 'A:○';
  autoEl.style.color = s.auto_switch ? 'var(--green)' : 'var(--dim)';
  autoEl.className = 'indicator' + (s.auto_switch ? ' on' : '');

  const soundEl = document.getElementById('ind-sound');
  soundEl.textContent = s.sound_on ? 'S:🔊' : 'S:🔇';
  soundEl.style.color = s.sound_on ? 'var(--cyan)' : 'var(--dim)';

  const voiceEl = document.getElementById('ind-voice');
  voiceEl.textContent = s.voice_on ? 'V:🗣' : 'V:  ';
  voiceEl.style.color = s.voice_on ? 'var(--yellow)' : 'var(--dim)';

  const pauseEl = document.getElementById('ind-pause');
  pauseEl.style.display = s.paused ? 'inline' : 'none';

  const liveEl = document.getElementById('status-live');
  liveEl.textContent = s.paused ? '[PAUSED]' : '[LIVE]';
  liveEl.className = s.paused ? 'paused' : 'live';

  document.getElementById('status-events').textContent = `Ev:${s.total_events}`;
  document.getElementById('status-time').textContent = new Date().toLocaleTimeString();

  // Active tab data
  const v = s.tabs[s.active_tab];

  // Order book
  document.getElementById('ob-title').textContent = `ORDER BOOK 五檔  ${v.symbol} ${v.name}`;
  const obEl = document.getElementById('order-book');
  if (v.order_book) {
    const ob = v.order_book;
    let html = '';
    // Asks (reversed: ask5 first, ask1 last)
    const maxLots = Math.max(...ob.asks.map(l => l.lots), ...ob.bids.map(l => l.lots), 1);
    for (let i = ob.asks.length - 1; i >= 0; i--) {
      const l = ob.asks[i];
      const pct = (l.lots / maxLots * 100).toFixed(0);
      html += `<div class="ob-row ask"><span class="ob-label">${l.label}</span><span class="ob-price">${l.price.toFixed(2)}</span><span class="ob-lots">${l.lots}張</span><div class="ob-bar" style="width:${pct}%"></div></div>`;
    }
    html += `<div class="spread-row">${ob.last_price.toFixed(2)} ${ob.last_side === 'Buy' ? '▲' : '▼'}  spread ${ob.spread.toFixed(2)}</div>`;
    for (const l of ob.bids) {
      const pct = (l.lots / maxLots * 100).toFixed(0);
      html += `<div class="ob-row bid"><span class="ob-label">${l.label}</span><span class="ob-price">${l.price.toFixed(2)}</span><span class="ob-lots">${l.lots}張</span><div class="ob-bar" style="width:${pct}%"></div></div>`;
    }
    html += `<div class="pressure-row"><span style="color:var(--green)">買壓 ${ob.bid_pressure_pct.toFixed(0)}%</span> / <span style="color:var(--red)">賣壓 ${ob.ask_pressure_pct.toFixed(0)}%</span></div>`;
    obEl.innerHTML = html;
  } else {
    obEl.innerHTML = '<div style="color:var(--dim);padding:8px">Waiting for order book...</div>';
  }

  // Signal radar
  document.getElementById('tick-title').textContent = `TICK FEED  ${v.symbol}`;
  const radarEl = document.getElementById('signal-radar');
  const scoreColor = v.composite_score > 0 ? 'var(--lgreen)' : v.composite_score < 0 ? 'var(--lred)' : 'var(--dim)';
  const scorePct = ((v.composite_score + 100) / 200 * 100).toFixed(1);
  const borderColor = v.composite_score > 30 ? 'var(--lgreen)' : v.composite_score < -30 ? 'var(--lred)' : 'var(--border)';
  const stateColor = v.state.includes('L-') ? 'var(--lgreen)' : v.state.includes('S-') ? 'var(--lred)' : v.state === 'NEUTRAL' ? 'var(--dim)' : '#555';
  const actionColor = v.action.includes('Bull') ? 'var(--lgreen)' : v.action.includes('Bear') ? 'var(--lred)' : 'var(--dim)';
  const chgColor = v.change_pct > 0 ? 'var(--lgreen)' : v.change_pct < 0 ? 'var(--lred)' : 'var(--dim)';

  const maxWhale = Math.max(v.whale_buys, v.whale_sells, v.long_ignitions, v.short_ignitions, 1);

  radarEl.innerHTML = `
    <div class="score-bar-wrap">
      <span class="score-label" style="color:${scoreColor}" data-testid="score-bar">${v.composite_score >= 0 ? '+' : ''}${v.composite_score}</span>
      <div class="score-bar">
        <div class="mid"></div>
        <div class="fill" style="background:${scoreColor};left:${v.composite_score >= 0 ? '50%' : scorePct + '%'};right:${v.composite_score >= 0 ? (100 - parseFloat(scorePct)) + '%' : '50%'}"></div>
      </div>
    </div>
    <div class="market-state" data-testid="market-state" style="color:${stateColor}">${v.state_icon} ${v.state}</div>
    <div class="hmm-state">HMM <span style="color:${v.hmm_state === 'H-IGNITE' ? 'var(--lgreen)' : v.hmm_state === 'H-ACCUM' ? 'var(--cyan)' : v.hmm_state === 'H-DIST' ? 'var(--lred)' : 'var(--dim)'}">${v.hmm_state_icon} ${v.hmm_state}</span><span class="${v.hmm_agrees ? 'hmm-agree' : 'hmm-div'}">${v.hmm_agrees ? '✓ AGREE' : '✗ DIV'}</span></div>
    <div class="action-box">
      <div class="action-label" data-testid="action-advice" style="color:${actionColor}">${v.action_label_zh}</div>
      <div class="sl-label">${v.stop_loss !== null ? 'S/L: ' + v.stop_loss.toFixed(2) : 'S/L: —'}</div>
    </div>
    <div style="margin-top:4px">
      <div class="counter-row"><span class="counter-label">WhaleBuy ▲</span><div class="counter-bar" style="background:rgba(105,240,174,0.3);width:${(v.whale_buys/maxWhale*100).toFixed(0)}%"></div><span class="counter-val" data-testid="whale-buy-count" style="color:var(--lgreen)">${v.whale_buys}</span></div>
      <div class="counter-row"><span class="counter-label">WhaleSell▼</span><div class="counter-bar" style="background:rgba(255,82,82,0.3);width:${(v.whale_sells/maxWhale*100).toFixed(0)}%"></div><span class="counter-val" style="color:var(--lred)">${v.whale_sells}</span></div>
      <div class="counter-row"><span class="counter-label">IgnLong  ▲</span><div class="counter-bar" style="background:rgba(76,175,80,0.3);width:${(v.long_ignitions/maxWhale*100).toFixed(0)}%"></div><span class="counter-val" style="color:var(--green)">${v.long_ignitions}</span></div>
      <div class="counter-row"><span class="counter-label">IgnShort ▼</span><div class="counter-bar" style="background:rgba(239,83,80,0.3);width:${(v.short_ignitions/maxWhale*100).toFixed(0)}%"></div><span class="counter-val" style="color:var(--red)">${v.short_ignitions}</span></div>
    </div>
    <div class="price-row">
      <span style="color:#fff;font-weight:bold">${v.last_price.toFixed(2)}</span>
      <span style="color:${chgColor}">${v.change_pct >= 0 ? '+' : ''}${v.change_pct.toFixed(2)}%</span>
      <span style="color:var(--dim)">Ticks:${v.total_ticks}</span>
    </div>
    ${v.last_sound ? `<div class="sound-row">🔊 ${v.last_sound.label} ${v.last_sound.timestamp}</div>` : ''}
  `;

  // Alerts
  const alertsEl = document.getElementById('alerts');
  if (v.alerts.length === 0) {
    alertsEl.innerHTML = '<div style="color:var(--dim);padding:4px">Watching for whale activity...</div>';
  } else {
    let ahtml = '';
    v.alerts.forEach((a, i) => {
      const color = a.is_ignition ? (a.line1.includes('▲') ? 'var(--lgreen)' : 'var(--lred)') : 'var(--cyan)';
      ahtml += `<div class="alert-item" data-testid="alert-${i}"><div class="alert-time">${a.icon} ${a.timestamp}</div><div class="alert-line1" style="color:${color};font-weight:${a.is_ignition ? 'bold' : 'normal'}">${a.line1}</div><div class="alert-line2">${a.line2}</div></div>`;
    });
    alertsEl.innerHTML = ahtml;
  }

  // Tick feed
  const feedEl = document.getElementById('tick-feed');
  if (v.ticks.length === 0) {
    feedEl.innerHTML = '<div style="color:var(--dim);padding:4px">Starting tick feed...</div>';
  } else {
    let thtml = '';
    v.ticks.forEach((t, i) => {
      const sideColor = t.side === 'Buy' ? 'var(--lgreen)' : 'var(--lred)';
      const tagColor = t.amount_m >= 50 ? 'var(--magenta)' : t.amount_m >= 20 ? 'var(--yellow)' : t.amount_m >= 5 ? 'var(--cyan)' : 'var(--dim)';
      const amtColor = t.amount_m >= 5 ? 'var(--yellow)' : 'var(--dim)';
      thtml += `<div class="tick-item" data-testid="tick-${i}"><span class="tick-time">${t.timestamp}</span><span class="tick-arrow" style="color:${sideColor}">${t.arrow}</span><span class="tick-price" style="color:${sideColor}">${t.price.toFixed(2)}</span><span class="tick-tag" style="color:${tagColor}">${t.whale_tag}</span><span class="tick-amount" style="color:${amtColor}">${t.amount_m.toFixed(1)}M</span><span class="tick-shares">${t.shares}sh</span></div>`;
    });
    feedEl.innerHTML = thtml;
  }
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key >= '1' && e.key <= '5') switchTab(parseInt(e.key) - 1);
  else if (e.key === 'ArrowRight' || e.key === 'Tab') { e.preventDefault(); cmd('next_tab'); }
  else if (e.key === 'ArrowLeft') cmd('prev_tab');
  else if (e.key === 'p' || e.key === 'P') cmd('toggle_pause');
  else if (e.key === 'a' || e.key === 'A') cmd('toggle_auto');
  else if (e.key === 's' || e.key === 'S') cmd('toggle_sound');
  else if (e.key === 'v' || e.key === 'V') cmd('toggle_voice');
  else if (e.key === ' ') { e.preventDefault(); cmd('clear_alerts'); }
  else if (e.key === 'q' || e.key === 'Q') cmd('quit');
});
</script>
</body>
</html>
